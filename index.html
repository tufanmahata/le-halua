<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Number Details</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        h2 { text-align: center; margin-top: 0; color: var(--primary); }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        #res { width: 100%; max-width: 600px; }

        .profile-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            border-left: 6px solid var(--primary);
        }

        .name-header {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .data-item { background: #f9fafb; padding: 10px; border-radius: 8px; }
        
        .full-width { grid-column: span 2; }

        .label { 
            color: var(--text-muted); 
            font-size: 10px; 
            text-transform: uppercase; 
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }
        
        .value { font-size: 13px; font-weight: 600; word-break: break-word; }

        .loading { text-align: center; color: var(--text-muted); padding: 20px; }
        .error-msg { text-align: center; color: #dc2626; background: #fee2e2; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="search-container">
    <h2>DATA FINDER POWER BY TUFAN</h2>
    <input type="number" id="numInput" placeholder="Enter Mobile Number">
    <button onclick="fetchData()">Search Records</button>
</div>

<div id="res"></div>

<script>
    async function fetchData() {
        const num = document.getElementById('numInput').value;
        const resDiv = document.getElementById('res');
        if(!num) return;

        resDiv.innerHTML = '<div class="loading">Searching Database...</div>';

        try {
            // Using your actual Render URL
            const response = await fetch('https://information-api-1xu5.onrender.com/process-number', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userNumber: num })
            });

            const result = await response.json();
            
            // Fixed: Accessing data.data based on your JSON structure
            const records = result.data.data;

            if (records && records.length > 0) {
                let html = '';
                records.forEach(p => {
                    html += `<div class="profile-card">
                                <b>Name:</b> ${p.name || 'N/A'}<br>
                                <b>Father:</b> ${p.fname || 'N/A'}<br>
                                <b>Mobile:</b> ${p.mobile || 'N/A'}<br>
                                <b>Circle:</b> ${p.circle || 'N/A'}<br>
                                <b>Aadhaar:</b> ${p.id || 'N/A'}<br>
                                <b>Address:</b> ${p.address || 'N/A'}<br>
                                <b>Alternator Number:</b> ${p.alt || 'N/A'}<br>
                                <b>Email:</b> ${p.email || 'N/A' }<br>
                            </div>`;
                });
                resDiv.innerHTML = html;
            } else {
                resDiv.innerHTML = '<div class="error-msg">No records found for this number.</div>';
            }
        } catch (error) {
            console.error(error);
            resDiv.innerHTML = '<div class="error-msg">Server Connection Error. Ensure your Render app is awake.</div>';
        }
    }
</script>

</body>
</html>
